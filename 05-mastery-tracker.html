<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRE Verbal Mastery Trainer - Mastery Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #FAF7F2; --cream-dark: #F0EAE0;
      --gold: #C9A84C; --gold-light: #E2C47A; --gold-dim: rgba(201,168,76,0.12);
      --ink: #1A1612; --ink-soft: #4A3F35; --ink-muted: #8A7968;
      --error: #C0392B; --success: #27AE60; --warning: #E67E22;
      --radius: 10px; --shadow: 0 4px 24px rgba(26,22,18,0.08);
    }
    body { background: var(--cream); font-family: "Plus Jakarta Sans", sans-serif; color: var(--ink); min-height: 100vh; }
    .nav { background: var(--ink); padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-mark { width: 32px; height: 32px; background: var(--gold); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .nav-mark svg { width: 18px; height: 18px; fill: none; stroke: var(--cream); stroke-width: 2; }
    .nav-title { font-family: "DM Serif Display", serif; font-size: 1rem; color: var(--cream); }
    .nav-links { display: flex; gap: 8px; }
    .nav-link { padding: 7px 14px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none; background: transparent; color: var(--ink-muted); text-decoration: none; }
    .nav-link:hover { background: rgba(255,255,255,0.08); color: var(--cream); }
    .nav-link.active { background: var(--gold-dim); color: var(--gold); }
    .page { max-width: 900px; margin: 0 auto; padding: 40px 24px 80px; }
    .page-eyebrow { font-size: 0.75rem; font-weight: 600; color: var(--gold); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
    .page-title { font-family: "DM Serif Display", serif; font-size: 2rem; color: var(--ink); line-height: 1.2; margin-bottom: 8px; }
    .page-sub { font-size: 0.9rem; color: var(--ink-muted); line-height: 1.6; margin-bottom: 36px; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 36px; }
    .stat-card { background: #fff; border-radius: 12px; padding: 20px; border: 1px solid var(--cream-dark); box-shadow: var(--shadow); text-align: center; }
    .stat-number { font-family: "DM Serif Display", serif; font-size: 2rem; color: var(--ink); line-height: 1; }
    .stat-number.gold { color: var(--gold); }
    .stat-number.green { color: var(--success); }
    .stat-label { font-size: 0.72rem; color: var(--ink-muted); margin-top: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .filter-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-tab { padding: 7px 16px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all 0.2s; border: 1.5px solid var(--cream-dark); background: var(--cream); color: var(--ink-muted); }
    .filter-tab:hover { border-color: var(--gold-light); color: var(--ink); }
    .filter-tab.active { border-color: var(--gold); background: var(--gold-dim); color: var(--gold); }
    .concept-list { display: flex; flex-direction: column; gap: 12px; }
    .concept-card { background: #fff; border-radius: 12px; border: 1px solid var(--cream-dark); padding: 20px 24px; box-shadow: var(--shadow); transition: all 0.2s; }
    .concept-card.mastered { opacity: 0.65; border-color: var(--success); }
    .concept-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 12px; flex-wrap: wrap; }
    .concept-name { font-size: 0.95rem; font-weight: 600; color: var(--ink); }
    .concept-meta { display: flex; align-items: center; gap: 10px; }
    .status-badge { padding: 3px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
    .status-badge.weak { background: #FDF0EE; color: var(--error); }
    .status-badge.developing { background: #FEF9EE; color: var(--warning); }
    .status-badge.strong { background: #EEF8F2; color: var(--success); }
    .status-badge.mastered { background: #EEF8F2; color: var(--success); border: 1px solid var(--success); }
    .accuracy-text { font-size: 0.78rem; font-weight: 700; color: var(--ink-muted); }
    .progress-wrap { height: 6px; background: var(--cream-dark); border-radius: 3px; margin-bottom: 12px; overflow: hidden; }
    .progress-bar { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
    .progress-bar.weak { background: var(--error); }
    .progress-bar.developing { background: var(--warning); }
    .progress-bar.strong, .progress-bar.mastered { background: var(--success); }
    .concept-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .concept-stats { display: flex; gap: 16px; }
    .concept-stat { font-size: 0.75rem; color: var(--ink-muted); }
    .concept-stat span { font-weight: 700; color: var(--ink); }
    .btn-master { padding: 7px 16px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: "Plus Jakarta Sans", sans-serif; border: 1.5px solid var(--success); background: transparent; color: var(--success); }
    .btn-master:hover { background: #EEF8F2; }
    .btn-unmaster { padding: 7px 16px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: "Plus Jakarta Sans", sans-serif; border: 1.5px solid var(--cream-dark); background: transparent; color: var(--ink-muted); }
    .btn-unmaster:hover { border-color: var(--error); color: var(--error); }
    .empty-state { background: #fff; border-radius: 16px; border: 1px solid var(--cream-dark); padding: 60px 24px; text-align: center; box-shadow: var(--shadow); }
    .empty-icon { font-size: 2.5rem; margin-bottom: 16px; opacity: 0.4; }
    .empty-title { font-family: "DM Serif Display", serif; font-size: 1.2rem; margin-bottom: 8px; }
    .empty-sub { font-size: 0.85rem; color: var(--ink-muted); margin-bottom: 20px; }
    .btn-primary { display: inline-block; padding: 11px 24px; background: var(--gold); color: var(--cream); border: none; border-radius: var(--radius); font-family: "Plus Jakarta Sans", sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; text-decoration: none; }
    .btn-primary:hover { background: var(--gold-light); }
    .section-title { font-family: "DM Serif Display", serif; font-size: 1.3rem; color: var(--ink); margin-bottom: 16px; }
    .footer-note { text-align: center; margin-top: 48px; font-size: 0.75rem; color: var(--ink-muted); }
    @media (max-width: 600px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
<nav class="nav">
  <a class="nav-brand" href="#">
    <div class="nav-mark">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <span class="nav-title">Verbal Mastery Trainer</span>
  </a>
  <div class="nav-links">
    <a class="nav-link" href="02-error-log.html">Error Log</a>
    <a class="nav-link" href="03-weakness-profile-v2.html">Weakness Profile</a>
    <a class="nav-link" href="04-question-generator.html">Practice</a>
    <a class="nav-link active" href="05-mastery-tracker.html">Mastery</a>
  </div>
</nav>
<div class="page">
  <div class="page-eyebrow">Progress</div>
  <h1 class="page-title">Mastery Tracker</h1>
  <p class="page-sub">Track your accuracy per concept. Mark concepts as mastered to retire them from the practice queue.</p>
  <div id="stats-row" class="stats-row"></div>
  <div class="section-title">Concepts</div>
  <div class="filter-tabs" id="filter-tabs">
    <div class="filter-tab active" data-filter="all">All</div>
    <div class="filter-tab" data-filter="weak">Weak</div>
    <div class="filter-tab" data-filter="developing">Developing</div>
    <div class="filter-tab" data-filter="strong">Strong</div>
    <div class="filter-tab" data-filter="mastered">Mastered</div>
  </div>
  <div id="concept-list" class="concept-list"></div>
  <div class="footer-note">GRE Verbal Mastery Trainer &middot; Built for precision, not volume</div>
</div>
<script>
var errorLog = JSON.parse(localStorage.getItem("gvmt_error_log") || "[]");
var practiceLog = JSON.parse(localStorage.getItem("gvmt_practice_log") || "[]");
var mastered = JSON.parse(localStorage.getItem("gvmt_mastered") || "[]");
var currentFilter = "all";

function buildConceptData() {
  var concepts = {};
  errorLog.forEach(function(entry) {
    var d = entry.diagnosis;
    if (!d || !d.concepts) return;
    d.concepts.forEach(function(c) {
      if (!concepts[c]) concepts[c] = { errors: 0, practiced: 0, correct: 0, qtype: d.question_type || "RC" };
      concepts[c].errors++;
    });
  });
  practiceLog.forEach(function(entry) {
    var c = entry.concept;
    if (!c) return;
    if (!concepts[c]) concepts[c] = { errors: 0, practiced: 0, correct: 0, qtype: entry.qtype || "RC" };
    concepts[c].practiced++;
    if (entry.correct) concepts[c].correct++;
  });
  return concepts;
}

function getStatus(data, isMastered) {
  if (isMastered) return "mastered";
  if (data.practiced === 0) return "weak";
  var acc = data.correct / data.practiced;
  if (acc >= 0.8) return "strong";
  if (acc >= 0.5) return "developing";
  return "weak";
}

function getAccuracyText(data) {
  if (data.practiced === 0) return "Not yet practiced";
  return Math.round((data.correct / data.practiced) * 100) + "% accuracy";
}

function render() {
  var concepts = buildConceptData();
  var keys = Object.keys(concepts);

  if (keys.length === 0) {
    document.getElementById("stats-row").innerHTML = "";
    document.getElementById("concept-list").innerHTML =
      "<div class="empty-state">" +
        "<div class="empty-icon">&#127981;</div>" +
        "<div class="empty-title">No data yet</div>" +
        "<p class="empty-sub">Log missed questions and practice to build your mastery profile.</p>" +
        "<a class="btn-primary" href="02-error-log.html">Log a Question</a>" +
      "</div>";
    return;
  }

  var totalConcepts = keys.length;
  var masteredCount = mastered.length;
  var totalPracticed = practiceLog.length;
  var totalCorrect = practiceLog.filter(function(e) { return e.correct; }).length;
  var overallAcc = totalPracticed > 0 ? Math.round((totalCorrect / totalPracticed) * 100) : 0;

  document.getElementById("stats-row").innerHTML =
    "<div class="stat-card"><div class="stat-number gold">" + totalConcepts + "</div><div class="stat-label">Concepts Tracked</div></div>" +
    "<div class="stat-card"><div class="stat-number green">" + masteredCount + "</div><div class="stat-label">Mastered</div></div>" +
    "<div class="stat-card"><div class="stat-number">" + totalPracticed + "</div><div class="stat-label">Questions Practiced</div></div>" +
    "<div class="stat-card"><div class="stat-number gold">" + (totalPracticed > 0 ? overallAcc + "%" : "-") + "</div><div class="stat-label">Overall Accuracy</div></div>";

  keys.sort(function(a, b) {
    var aMastered = mastered.indexOf(a) >= 0;
    var bMastered = mastered.indexOf(b) >= 0;
    if (aMastered !== bMastered) return aMastered ? 1 : -1;
    return (concepts[b].errors + concepts[b].practiced) - (concepts[a].errors + concepts[a].practiced);
  });

  var filtered = keys.filter(function(k) {
    var isMastered = mastered.indexOf(k) >= 0;
    var status = getStatus(concepts[k], isMastered);
    return currentFilter === "all" || status === currentFilter;
  });

  if (filtered.length === 0) {
    document.getElementById("concept-list").innerHTML =
      "<div class="empty-state"><div class="empty-icon">&#128269;</div><div class="empty-title">No concepts in this category</div></div>";
    return;
  }

  document.getElementById("concept-list").innerHTML = filtered.map(function(k) {
    var data = concepts[k];
    var isMastered = mastered.indexOf(k) >= 0;
    var status = getStatus(data, isMastered);
    var acc = data.practiced > 0 ? Math.round((data.correct / data.practiced) * 100) : 0;
    var barWidth = data.practiced > 0 ? acc : 0;
    var actionBtn = isMastered
      ? "<button class="btn-unmaster" data-concept="" + k + "">Reactivate</button>"
      : (status === "strong" ? "<button class="btn-master" data-concept="" + k + "">Mark Mastered</button>" : "");
    return "<div class="concept-card" + (isMastered ? " mastered" : "") + "">" +
      "<div class="concept-card-top">" +
        "<span class="concept-name">" + k + "</span>" +
        "<div class="concept-meta">" +
          "<span class="accuracy-text">" + getAccuracyText(data) + "</span>" +
          "<span class="status-badge " + status + "">" + status + "</span>" +
        "</div>" +
      "</div>" +
      "<div class="progress-wrap"><div class="progress-bar " + status + "" style="width:" + barWidth + "%"></div></div>" +
      "<div class="concept-footer">" +
        "<div class="concept-stats">" +
          "<div class="concept-stat">Errors: <span>" + data.errors + "</span></div>" +
          "<div class="concept-stat">Practiced: <span>" + data.practiced + "</span></div>" +
          "<div class="concept-stat">Correct: <span>" + data.correct + "</span></div>" +
        "</div>" +
        actionBtn +
      "</div>" +
    "</div>";
  }).join("");

  document.querySelectorAll(".btn-master").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var concept = this.getAttribute("data-concept");
      if (mastered.indexOf(concept) < 0) mastered.push(concept);
      localStorage.setItem("gvmt_mastered", JSON.stringify(mastered));
      render();
    });
  });

  document.querySelectorAll(".btn-unmaster").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var concept = this.getAttribute("data-concept");
      mastered = mastered.filter(function(c) { return c !== concept; });
      localStorage.setItem("gvmt_mastered", JSON.stringify(mastered));
      render();
    });
  });
}

document.querySelectorAll(".filter-tab").forEach(function(tab) {
  tab.addEventListener("click", function() {
    document.querySelectorAll(".filter-tab").forEach(function(t) { t.classList.remove("active"); });
    this.classList.add("active");
    currentFilter = this.getAttribute("data-filter");
    render();
  });
});

render();
</script>
</body>
</html>
