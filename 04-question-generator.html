<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRE Verbal Mastery Trainer — Practice</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #FAF7F2; --cream-dark: #F0EAE0; --cream-mid: #E8E0D4;
      --gold: #C9A84C; --gold-light: #E2C47A; --gold-dim: rgba(201,168,76,0.12);
      --ink: #1A1612; --ink-soft: #4A3F35; --ink-muted: #8A7968;
      --error: #C0392B; --success: #27AE60; --warning: #E67E22;
      --radius: 10px; --shadow: 0 4px 24px rgba(26,22,18,0.08);
    }
    body { background: var(--cream); font-family: "Plus Jakarta Sans", sans-serif; color: var(--ink); min-height: 100vh; }

    .nav {
      background: var(--ink); padding: 14px 32px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-mark { width: 32px; height: 32px; background: var(--gold); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .nav-mark svg { width: 18px; height: 18px; fill: none; stroke: var(--cream); stroke-width: 2; }
    .nav-title { font-family: "DM Serif Display", serif; font-size: 1rem; color: var(--cream); }
    .nav-links { display: flex; gap: 8px; }
    .nav-link {
      padding: 7px 14px; border-radius: 6px; font-size: 0.8rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; border: none; background: transparent; color: var(--ink-muted);
      text-decoration: none;
    }
    .nav-link:hover { background: rgba(255,255,255,0.08); color: var(--cream); }
    .nav-link.active { background: var(--gold-dim); color: var(--gold); }

    .page { max-width: 780px; margin: 0 auto; padding: 40px 24px 80px; }

    .page-header { margin-bottom: 36px; }
    .page-eyebrow { font-size: 0.75rem; font-weight: 600; color: var(--gold); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
    .page-title { font-family: "DM Serif Display", serif; font-size: 2rem; color: var(--ink); line-height: 1.2; }
    .page-sub { font-size: 0.9rem; color: var(--ink-muted); margin-top: 8px; line-height: 1.6; }

    /* Target concept bar */
    .target-bar {
      background: var(--ink); border-radius: 12px; padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }
    .target-label { font-size: 0.75rem; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .target-concept { font-size: 0.95rem; font-weight: 600; color: var(--gold); }
    .target-actions { display: flex; gap: 8px; }
    .btn-ghost {
      padding: 8px 16px; background: rgba(255,255,255,0.08); color: var(--cream);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
      font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
      font-family: "Plus Jakarta Sans", sans-serif;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.15); }

    /* Question card */
    .question-card {
      background: #fff; border-radius: 16px; box-shadow: var(--shadow);
      border: 1px solid var(--cream-dark); overflow: hidden; margin-bottom: 20px;
    }
    .question-card-header {
      padding: 16px 24px; background: var(--cream); border-bottom: 1px solid var(--cream-dark);
      display: flex; align-items: center; justify-content: space-between;
    }
    .qtype-badge {
      padding: 4px 12px; background: var(--gold-dim); color: var(--gold);
      border-radius: 12px; font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em; border: 1px solid rgba(201,168,76,0.3);
    }
    .question-num { font-size: 0.78rem; color: var(--ink-muted); }
    .question-body { padding: 28px 28px 20px; }
    .passage {
      font-size: 0.88rem; color: var(--ink-soft); line-height: 1.8;
      padding: 16px 20px; background: var(--cream); border-radius: 8px;
      border-left: 3px solid var(--cream-mid); margin-bottom: 20px;
    }
    .question-stem { font-size: 0.95rem; color: var(--ink); line-height: 1.6; margin-bottom: 20px; font-weight: 500; }

    /* Answer choices */
    .choices { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .choice {
      display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px;
      border: 1.5px solid var(--cream-dark); border-radius: var(--radius);
      cursor: pointer; transition: all 0.2s; background: var(--cream);
    }
    .choice:hover { border-color: var(--gold-light); background: #fff; }
    .choice.selected { border-color: var(--gold); background: var(--gold-dim); }
    .choice.correct { border-color: var(--success); background: #EEF8F2; }
    .choice.incorrect { border-color: var(--error); background: #FDF0EE; }
    .choice-letter {
      width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid var(--cream-mid);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; color: var(--ink-muted); flex-shrink: 0;
      transition: all 0.2s;
    }
    .choice.selected .choice-letter { border-color: var(--gold); color: var(--gold); background: #fff; }
    .choice.correct .choice-letter { border-color: var(--success); color: var(--success); background: #fff; }
    .choice.incorrect .choice-letter { border-color: var(--error); color: var(--error); background: #fff; }
    .choice-text { font-size: 0.88rem; color: var(--ink-soft); line-height: 1.5; padding-top: 2px; }

    /* Text input for SE/TC */
    .blank-inputs { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .blank-input-wrap { display: flex; align-items: center; gap: 12px; }
    .blank-label { font-size: 0.78rem; font-weight: 600; color: var(--ink-muted); min-width: 60px; }
    .blank-select {
      flex: 1; padding: 10px 14px; border: 1.5px solid var(--cream-dark);
      border-radius: var(--radius); font-family: "Plus Jakarta Sans", sans-serif;
      font-size: 0.88rem; color: var(--ink); background: var(--cream); outline: none;
      transition: border-color 0.2s; cursor: pointer;
    }
    .blank-select:focus { border-color: var(--gold); background: #fff; }

    /* Submit row */
    .question-footer { padding: 0 28px 24px; display: flex; gap: 12px; align-items: center; }
    .btn-primary {
      padding: 12px 24px; background: var(--gold); color: var(--cream);
      border: none; border-radius: var(--radius); font-family: "Plus Jakarta Sans", sans-serif;
      font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .btn-primary:hover { background: var(--gold-light); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-secondary {
      padding: 12px 20px; background: transparent; color: var(--ink-soft);
      border: 1.5px solid var(--cream-dark); border-radius: var(--radius);
      font-family: "Plus Jakarta Sans", sans-serif; font-size: 0.88rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }

    /* Evaluation */
    .eval-card {
      background: #fff; border-radius: 16px; box-shadow: var(--shadow);
      border: 1px solid var(--cream-dark); overflow: hidden; margin-bottom: 20px;
      display: none; animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .eval-header {
      padding: 16px 24px; display: flex; align-items: center; gap: 12px;
    }
    .eval-header.correct { background: #EEF8F2; border-bottom: 1px solid #C0E8D0; }
    .eval-header.incorrect { background: #FDF0EE; border-bottom: 1px solid #F5C6C0; }
    .eval-icon { font-size: 1.3rem; }
    .eval-verdict { font-size: 0.95rem; font-weight: 700; }
    .eval-header.correct .eval-verdict { color: var(--success); }
    .eval-header.incorrect .eval-verdict { color: var(--error); }
    .eval-body { padding: 24px; }
    .eval-section { margin-bottom: 18px; }
    .eval-section:last-child { margin-bottom: 0; }
    .eval-label { font-size: 0.72rem; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
    .eval-text { font-size: 0.88rem; color: var(--ink-soft); line-height: 1.7; background: var(--cream); border-radius: 8px; padding: 12px 14px; }

    /* Score tracker */
    .score-bar {
      background: #fff; border-radius: 12px; border: 1px solid var(--cream-dark);
      padding: 16px 20px; margin-bottom: 24px; display: flex; gap: 24px; align-items: center;
    }
    .score-item { text-align: center; }
    .score-num { font-family: "DM Serif Display", serif; font-size: 1.5rem; }
    .score-num.correct { color: var(--success); }
    .score-num.incorrect { color: var(--error); }
    .score-num.total { color: var(--ink); }
    .score-lbl { font-size: 0.7rem; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .score-divider { width: 1px; height: 40px; background: var(--cream-dark); }
    .score-pct { font-family: "DM Serif Display", serif; font-size: 1.8rem; color: var(--gold); margin-left: auto; }

    /* Empty / loading */
    .empty-state {
      background: #fff; border-radius: 16px; border: 1px solid var(--cream-dark);
      padding: 60px 24px; text-align: center; box-shadow: var(--shadow);
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 16px; opacity: 0.4; }
    .empty-title { font-family: "DM Serif Display", serif; font-size: 1.2rem; margin-bottom: 8px; }
    .empty-sub { font-size: 0.85rem; color: var(--ink-muted); margin-bottom: 20px; }

    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    .spinner-dark {
      display: inline-block; width: 32px; height: 32px;
      border: 3px solid var(--cream-dark); border-top-color: var(--gold);
      border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-note { text-align: center; margin-top: 48px; font-size: 0.75rem; color: var(--ink-muted); }
  </style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="#">
    <div class="nav-mark">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <span class="nav-title">Verbal Mastery Trainer</span>
  </a>
  <div class="nav-links">
    <a class="nav-link" href="02-error-log.html">Error Log</a>
    <a class="nav-link" href="03-weakness-profile-v2.html">Weakness Profile</a>
    <a class="nav-link active" href="04-question-generator.html">Practice</a>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div class="page-eyebrow">Targeted Practice</div>
    <h1 class="page-title">Practice Questions</h1>
    <p class="page-sub">Questions generated to target your exact weak concepts. Each one is calibrated to the errors in your log.</p>
  </div>

  <div id="main-content"></div>

  <div class="footer-note">GRE Verbal Mastery Trainer · Built for precision, not volume</div>
</div>

<script>
  const PROXY = 'https://withered-poetry-abe5.glorykwekukankamsey.workers.dev';
  const errorLog = JSON.parse(localStorage.getItem('gvmt_error_log') || '[]');
  const practiceLog = JSON.parse(localStorage.getItem('gvmt_practice_log') || '[]');

  let currentQuestion = null;
  let selectedAnswer = null;
  let sessionCorrect = 0;
  let sessionIncorrect = 0;
  let sessionTotal = 0;
  let targetConcept = null;
  let targetQType = null;

  function getWeakConcepts() {
    const conceptMap = {};
    errorLog.forEach(function(entry) {
      const d = entry.diagnosis;
      if (!d) return;
      (d.concepts || []).forEach(function(c) {
        if (!conceptMap[c]) conceptMap[c] = { count: 0, severity: 0, qtype: d.question_type };
        conceptMap[c].count++;
        conceptMap[c].severity = Math.max(conceptMap[c].severity, d.severity || 1);
      });
    });
    return Object.entries(conceptMap).sort(function(a, b) {
      if (b[1].severity !== a[1].severity) return b[1].severity - a[1].severity;
      return b[1].count - a[1].count;
    });
  }

  function render() {
    const container = document.getElementById('main-content');

    if (errorLog.length === 0) {
      container.innerHTML =
        '<div class="empty-state">' +
          '<div class="empty-icon">📝</div>' +
          '<div class="empty-title">No weakness data yet</div>' +
          '<p class="empty-sub">Log some missed questions first so the practice engine knows what to target.</p>' +
          '<a class="btn-primary" href="02-error-log.html">Go to Error Log</a>' +
        '</div>';
      return;
    }

    const concepts = getWeakConcepts();
    if (!targetConcept) {
      targetConcept = concepts[0][0];
      targetQType = concepts[0][1].qtype || 'RC';
    }

    const conceptOptions = concepts.map(function(c) {
      return '<option value="' + c[0] + '" ' + (c[0] === targetConcept ? 'selected' : '') + '>' + c[0] + '</option>';
    }).join('');

    const pct = sessionTotal > 0 ? Math.round((sessionCorrect / sessionTotal) * 100) : 0;

    container.innerHTML =
      '<div class="score-bar">' +
        '<div class="score-item"><div class="score-num correct">' + sessionCorrect + '</div><div class="score-lbl">Correct</div></div>' +
        '<div class="score-divider"></div>' +
        '<div class="score-item"><div class="score-num incorrect">' + sessionIncorrect + '</div><div class="score-lbl">Wrong</div></div>' +
        '<div class="score-divider"></div>' +
        '<div class="score-item"><div class="score-num total">' + sessionTotal + '</div><div class="score-lbl">Attempted</div></div>' +
        '<div class="score-pct">' + (sessionTotal > 0 ? pct + '%' : '—') + '</div>' +
      '</div>' +

      '<div class="target-bar">' +
        '<div>' +
          '<div class="target-label">Targeting concept</div>' +
          '<div class="target-concept">' + targetConcept + '</div>' +
        '</div>' +
        '<div class="target-actions">' +
          '<select id="concept-select" style="padding:8px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);color:#fff;font-size:0.78rem;font-family:Plus Jakarta Sans,sans-serif;cursor:pointer;">' +
            conceptOptions +
          '</select>' +
          '<button class="btn-ghost" id="btn-generate">Generate Question</button>' +
        '</div>' +
      '</div>' +

      '<div id="question-area"></div>' +
      '<div class="eval-card" id="eval-card"></div>';

    document.getElementById('concept-select').addEventListener('change', function() {
      const selected = concepts.find(function(c) { return c[0] === this.value; }.bind(this));
      targetConcept = this.value;
      targetQType = selected ? selected[1].qtype : 'RC';
    });

    document.getElementById('btn-generate').addEventListener('click', generateQuestion);
    generateQuestion();
  }

  async function generateQuestion() {
    const area = document.getElementById('question-area');
    const evalCard = document.getElementById('eval-card');
    if (evalCard) evalCard.style.display = 'none';
    selectedAnswer = null;
    currentQuestion = null;

    area.innerHTML =
      '<div style="text-align:center;padding:60px 24px;">' +
        '<div class="spinner-dark"></div>' +
        '<p style="color:var(--ink-muted);font-size:0.88rem;">Generating a ' + targetQType + ' question targeting<br><strong>' + targetConcept + '</strong>...</p>' +
      '</div>';

    const prompt = [
    "You are an expert GRE question writer. Generate ONE authentic GRE Verbal question targeting the concept: " + targetConcept + ".",
    "Question type: " + targetQType,
    "IMPORTANT: Return ONLY raw JSON, no markdown, no backticks. Use this exact structure:",
    JSON.stringify({
      type: "RC",
      passage: "passage text if RC, else null",
      stem: "the question stem",
      choices: [
        {letter: "A", text: "choice text"},
        {letter: "B", text: "choice text"},
        {letter: "C", text: "choice text"},
        {letter: "D", text: "choice text"},
        {letter: "E", text: "choice text"}
      ],
      correct: "A",
      concept_tested: targetConcept,
      difficulty: "hard"
    }, null, 2),
    "For TC/SE questions, set passage to null and use 3-5 choices. For RC, include a short 80-120 word passage. Make it genuinely hard, at the 160-170V level. The correct answer must be defensible from the text/logic alone."
  ].join("\n\n");

    try {
      const response = await fetch(PROXY, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await response.json();
      const text = data.content[0].text.trim().replace(/```json|```/g, '').trim();
      currentQuestion = JSON.parse(text);
      renderQuestion(currentQuestion);

    } catch (err) {
      area.innerHTML =
        '<div class="empty-state">' +
          '<div class="empty-icon">⚠️</div>' +
          '<div class="empty-title">Generation failed</div>' +
          '<p class="empty-sub">Please try again.</p>' +
          '<button class="btn-primary" onclick="generateQuestion()">Try Again</button>' +
        '</div>';
    }
  }

  function renderQuestion(q) {
    const area = document.getElementById('question-area');
    sessionTotal++;

    const choicesHTML = (q.choices || []).map(function(c) {
      return '<div class="choice" data-letter="' + c.letter + '">' +
        '<div class="choice-letter">' + c.letter + '</div>' +
        '<div class="choice-text">' + c.text + '</div>' +
      '</div>';
    }).join('');

    area.innerHTML =
      '<div class="question-card">' +
        '<div class="question-card-header">' +
          '<span class="qtype-badge">' + q.type + '</span>' +
          '<span class="question-num">Question #' + sessionTotal + '</span>' +
        '</div>' +
        '<div class="question-body">' +
          (q.passage ? '<div class="passage">' + q.passage + '</div>' : '') +
          '<div class="question-stem">' + q.stem + '</div>' +
          '<div class="choices" id="choices-wrap">' + choicesHTML + '</div>' +
        '</div>' +
        '<div class="question-footer">' +
          '<button class="btn-primary" id="btn-submit" disabled>Submit Answer</button>' +
          '<button class="btn-secondary" id="btn-skip">Skip</button>' +
        '</div>' +
      '</div>';

    document.querySelectorAll('.choice').forEach(function(el) {
      el.addEventListener('click', function() {
        if (this.classList.contains('correct') || this.classList.contains('incorrect')) return;
        document.querySelectorAll('.choice').forEach(function(c) { c.classList.remove('selected'); });
        this.classList.add('selected');
        selectedAnswer = this.dataset.letter;
        document.getElementById('btn-submit').disabled = false;
      });
    });

    document.getElementById('btn-submit').addEventListener('click', submitAnswer);
    document.getElementById('btn-skip').addEventListener('click', generateQuestion);
  }

  async function submitAnswer() {
    if (!selectedAnswer || !currentQuestion) return;
    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Evaluating...';

    const isCorrect = selectedAnswer === currentQuestion.correct;

    // Mark choices visually
    document.querySelectorAll('.choice').forEach(function(el) {
      if (el.dataset.letter === currentQuestion.correct) el.classList.add('correct');
      else if (el.dataset.letter === selectedAnswer && !isCorrect) el.classList.add('incorrect');
      el.style.pointerEvents = 'none';
    });

    if (isCorrect) sessionCorrect++;
    else sessionIncorrect++;

    // Update score display
    document.querySelector('.score-num.correct').textContent = sessionCorrect;
    document.querySelector('.score-num.incorrect').textContent = sessionIncorrect;
    const pct = Math.round((sessionCorrect / sessionTotal) * 100);
    document.querySelector('.score-pct').textContent = pct + '%';

    // Get explanation from Claude
    try {
      const prompt = [
        "A student answered a GRE " + currentQuestion.type + " question.",
        "Question: " + currentQuestion.stem,
        "Student chose: " + selectedAnswer,
        "Correct answer: " + currentQuestion.correct,
        "Result: " + (isCorrect ? "CORRECT" : "INCORRECT"),
        "Concept tested: " + currentQuestion.concept_tested,
        "Provide a brief evaluation in raw JSON only (no markdown):",
        '{"verdict":"Correct or Incorrect","explanation":"Why the correct answer is right","why_wrong":"Why wrong if incorrect else null","reinforcement":"Key principle to remember"}'
      ].join("\n");

      const response = await fetch(PROXY, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 500,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await response.json();
      const text = data.content[0].text.trim().replace(/```json|```/g, '').trim();
      const eval_result = JSON.parse(text);

      const evalCard = document.getElementById('eval-card');
      const headerClass = isCorrect ? 'correct' : 'incorrect';
      const icon = isCorrect ? '✓' : '✗';
      const verdict = isCorrect ? 'Correct' : 'Incorrect';

      evalCard.innerHTML =
        '<div class="eval-header ' + headerClass + '">' +
          '<span class="eval-icon">' + icon + '</span>' +
          '<span class="eval-verdict">' + verdict + '</span>' +
        '</div>' +
        '<div class="eval-body">' +
          '<div class="eval-section">' +
            '<div class="eval-label">Why ' + currentQuestion.correct + ' is correct</div>' +
            '<div class="eval-text">' + eval_result.explanation + '</div>' +
          '</div>' +
          (eval_result.why_wrong ? '<div class="eval-section"><div class="eval-label">Why your choice was wrong</div><div class="eval-text">' + eval_result.why_wrong + '</div></div>' : '') +
          '<div class="eval-section">' +
            '<div class="eval-label">Key principle</div>' +
            '<div class="eval-text" style="border-left:3px solid var(--gold);font-weight:600;">' + eval_result.reinforcement + '</div>' +
          '</div>' +
          '<div style="margin-top:20px;display:flex;gap:10px;">' +
            '<button class="btn-primary" id="btn-next">Next Question</button>' +
          '</div>' +
        '</div>';

      evalCard.style.display = 'block';
      evalCard.scrollIntoView({ behavior: 'smooth', block: 'start' });

      document.getElementById('btn-next').addEventListener('click', function() {
        render();
      });

      // Save to practice log
      practiceLog.unshift({
        id: Date.now(),
        date: new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }),
        concept: targetConcept,
        qtype: currentQuestion.type,
        correct: isCorrect,
        question: currentQuestion.stem
      });
      localStorage.setItem('gvmt_practice_log', JSON.stringify(practiceLog));

    } catch (err) {
      btn.disabled = false;
      btn.innerHTML = 'Submit Answer';
    }
  }

  render();
</script>
</body>
</html>
